<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0B3D2E" />
    <meta name="background-color" content="#CFFF2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TAG ASIA CUP" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="TAG ASIA CUP" />
    <meta name="description" content="Hong Kong Tag Rugby - Tag Asia Cup 2026 Official App. Fixtures, standings, teams, and live updates." />
    <meta name="keywords" content="tag rugby, HKTR, Tag Asia Cup, Hong Kong, rugby, sports" />
    <meta name="author" content="Hong Kong Tag Rugby" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="48x48" href="/icon-48x48.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icon-72x72.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="144x144" href="/icon-144x144.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://docs.google.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    
    <title>TAG ASIA CUP 2026</title>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
